name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Package & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Run tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test
        env:
          CI: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package extension (.vsix)
        run: npx vsce package --no-dependencies -o aide-${{ steps.version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aide-${{ steps.version.outputs.VERSION }}.vsix
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `aide-${{ steps.version.outputs.VERSION }}.vsix` from the Assets below
            2. In VS Code: `Ctrl+Shift+P` → **Extensions: Install from VSIX...**
            3. Select the downloaded file

            Or via CLI:
            ```bash
            code --install-extension aide-${{ steps.version.outputs.VERSION }}.vsix
            ```

      - name: Publish to VS Code Marketplace (optional)
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
